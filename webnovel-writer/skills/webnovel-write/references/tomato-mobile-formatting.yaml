schema_version: "2.0"
source: "webnovel-writer/tomato-mobile-formatting"
description: "番茄小说平台专属排版与极致去AI化规则集。核心理念：短平快、高频换行、对话独立、视觉留白。继承通用润色字典，正则负责暴力切分文字墙，LLM负责润色提速与场景切割，极致适配手机竖屏阅读体验。"

# ============================================================
# 继承关系
# ============================================================
inherits_from: "deepseek-universal-polish.yaml"
note: "番茄版在通用润色基础上，增加暴力排版和节奏提速规则"

# ============================================================
# 番茄专属配置
# ============================================================
config:
  max_chars_per_paragraph: 80
  max_sentences_per_paragraph: 2
  dialogue_isolation_enforced: true
  pacing_accelerate_rate: 0.85

# ============================================================
# 执行流程
# ============================================================
execution_flow: |
  本提示词在 deepseek-universal-polish.yaml 执行完毕后使用。
  
  输入：经过通用润色的章节正文
  输出：适配番茄平台的手机阅读版本
  
  执行顺序：
  1. 对话孤立：任何对话前后必须有双换行
  2. 文字墙粉碎：连续40字无换行且遇句号，强制换行
  3. 删除冗余描写：设定铺陈、环境描写极限压缩
  4. 删除番茄禁忌词：拖慢节奏的毒点词汇
  5. 节奏提速替换：传统过渡词→爆发力动作词
  6. 视觉动作强化：平淡动词→网文爽文动词
  7. 空白优化：收敛过多空行为标准双换行
  8. 章末留白：章末增加额外空行

# ============================================================
# 核心规则
# ============================================================

# 一、番茄专属正则规则
formatting_rules:
  dialogue_isolator:
    pattern: '(?<!\n\n)([「"].*?[」"])(?!\n\n)'
    action: "在对话前后插入双换行"
    example: "他走过去「你好」继续前进 → 他走过去\n\n「你好」\n\n继续前进"
    
  wall_of_text_breaker:
    pattern: '([^「」""\n]{40,}[。！？])(?=[^「」""\n])'
    action: "在句号/问号/叹号后强制换行"
    example: "连续80字的描写。继续描写 → 连续80字的描写。\n\n继续描写"
    
  blank_line_optimizer:
    pattern: '\n{3,}'
    action: "收敛为标准双换行"
    
  chapter_end_hook_spacer:
    pattern: '([。！？"」])\s*$'
    action: "章末增加额外空行"

# 二、番茄禁忌词（必须删除）
tomato_taboos:
  - "不知不觉间"
  - "时间一分一秒地过去"
  - "经过漫长的等待"
  - "心里暗暗想了很久"
  - "千言万语汇成一句话"
  - "陷入了长久的沉默"
  - "脑海中闪过无数个念头"
  - "从前有一个传说"
  - "很久很久以前"

# 三、节奏提速字典（85%概率替换）
pacing_accelerators:
  "他想了想": ["他眼珠一转", "他冷笑一声", "他眼神一凛"]
  "慢慢地走过去": ["大步上前", "几步跨到面前", "闪身逼近"]
  "看了很久": ["目光一扫", "死死盯住", "定睛一看"]
  "非常生气": ["怒火中烧", "脸色猛地沉了下来", "气极反笑"]
  "感觉很惊讶": ["倒吸一口凉气", "瞳孔猛地一缩", "心里咯噔一下"]
  "大声说道": ["厉声喝道", "脱口而出", "冷喝一声"]
  "点了点头": ["下巴一点", "不可置否", "算是默认"]
  "摇了摇头": ["嗤笑摇头", "眉头一皱"]
  "过了一会儿": ["半晌", "片刻后", "没过多久"]
  "开始准备": ["立刻动手", "毫不废话"]
  "仔细地观察": ["目光锐利如刀", "扫视一圈"]

# 四、视觉动作词典（85%概率替换）
visual_action_words:
  "拿": ["一把抓过", "抄起", "猛地抽出"]
  "放": ["重重摔下", "随手一掷", "甩在"]
  "跑": ["狂奔", "化作一道残影", "爆射而出"]
  "打": ["狠狠砸下", "一记重拳", "轰出"]
  "笑": ["咧嘴一笑", "冷笑", "嘴角勾起一抹讥讽"]
  "看": ["睥睨", "斜睨", "冷冷扫过"]
  "说": ["吐出几个字", "寒声道", "似笑非笑地说"]

# ============================================================
# LLM 执行指令
# ============================================================
llm_instructions: |
  你现在是番茄小说平台的白金作家兼主编。你的核心任务是将文本改编成适配手机竖屏的『爽文排版』。
  
  【极简短段】
  - 任何人的一句话必须独占一段！
  - 任何环境描写不能超过两句话！
  - 如果超过，必须强制按回车换行！
  
  【情绪外放】
  - 把主角内心的纠结、沉思，全部转化为外在的动作（如：冷笑、皱眉、握拳、叹息）
  
  【砍掉树枝】
  - 直接删掉没用的风景描写、衣服首饰描写、路人甲的背景介绍
  - 剧情必须像火箭一样往前推！
  
  【输出要求】
  - 直接输出改编后的正文，不附任何说明
  - 段落极短，对话独立，节奏飞快
  - 保留原文的情节和人物，只改排版和节奏

# ============================================================
# 使用方式
# ============================================================
# 1. 先用 deepseek-universal-polish.yaml 润色章节
# 2. 再用本文件对润色结果进行番茄平台适配
# 3. 最终输出适合手机竖屏阅读的短平快版本
