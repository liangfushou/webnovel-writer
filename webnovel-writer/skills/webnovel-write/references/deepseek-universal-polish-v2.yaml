# ============================================================
# 二、格式规范（硬性统一）
# ============================================================
formatting_rules:

  punctuation:
    quotes:
      rule: "中文引号统一使用出版规范格式"
      mapping:
        '"（左双）': "「"
        '"（右双）': "」"
        "'（左单）": "『"
        "'（右单）": "』"
        'ASCII 直双引号 "': "奇数次出现替换为「，偶数次替换为」"
        "ASCII 单引号 '": "保留原样（兼容英文撇号 don't / it's）"

    ellipsis:
      rule: "统一为两个中文省略号"
      normalize: "…… （U+2026 × 2）"
      triggers: "三个及以上英文句点、一个及以上中文省略号"

    dash:
      rule: "统一为两个中文破折号"
      normalize: "—— （U+2014 × 2）"
      triggers: "两个及以上连字符、任意 EN dash/EM dash"

  blank_lines:
    rule: "三行及以上连续空行压缩为两行"

  digit_to_chinese:
    description: "数字汉字化，按顺序处理以下四类"
    rules:
      - name: "4位年份"
        scope: "1900–2099 后接'年'"
        example: "1987年 → 一九八七年"
        method: "逐位查表：0→零 1→一 2→二 3→三 4→四 5→五 6→六 7→七 8→八 9→九"

      - name: "年代"
        scope: "XX0年代"
        example: "80年代 → 八十年代"
        mapping:
          "10": "十"
          "20": "二十"
          "30": "三十"
          "40": "四十"
          "50": "五十"
          "60": "六十"
          "70": "七十"
          "80": "八十"
          "90": "九十"

      - name: "月份"
        scope: "1–12 后接'月'，且前方不是数字、'年'、'个'"
        example: "3月 → 三月（但'5000年'/'3个月'不转换）"
        method: "小数字转汉字（见下方通用规则）"

      - name: "日期"
        scope: "1–31 后接'日'或'号'，且前方不是数字或'月'"
        example: "15日 → 十五日"
        method: "小数字转汉字（见下方通用规则）"

      - name: "小数字转汉字通用规则"
        range: "1–99"
        rules:
          "1–9":   "直接对应：一二三四五六七八九"
          "10":    "十"
          "11–19": "十 + 个位（如 15 → 十五）"
          "20–99": "十位 + 十 + 个位（整十省略个位，如 20 → 二十，35 → 三十五）"
          "100+":  "不转换"

# ============================================================
# 三、替换字典（按概率执行，保持自然感）
# ============================================================
replacement_strategy:
  description: |
    替换时遵循以下原则：
    1. 优先匹配较长的词组（避免短词先行截断长词）
    2. 替换候选必须排除 absolute_prohibitions.replacement_blacklist 中的词
    3. 短语级字典优先于词级字典执行
    4. 替换目标从候选列表中随机选取一个，使文本更自然
    5. 以下概率为参考，实际执行时综合上下文判断：
       - AI套话短语：约 85% 概率替换
       - 通用词汇：约 50% 概率替换
       - 小说口语词：约 50% 概率替换

  phrase_replacements:
    description: "AI 套话短语 → 自然表达（148 条，约 85% 概率替换）"
    # ... (完整的148条替换规则，内容太长省略)

  word_replacements:
    description: "通用词汇同义替换（105 词，约 50% 概率替换，候选排除黑名单）"
    # ... (完整的105条替换规则，内容太长省略)

  novel_oral_phrases:
    description: "小说口语短语（6 条，优先于词级匹配，约 50% 概率替换）"
    # ... (完整的6条替换规则)

  novel_oral_words:
    description: "小说口语词（19 条，约 50% 概率替换）"
    # ... (完整的19条替换规则)

# ============================================================
# 四、LLM 语义重写指令
# ============================================================
llm_rewrite_instructions:
  description: "在完成以上所有字典替换、格式规范、禁止词清理之后，执行以下语义层润色"

  core_tasks:
    - name: "消除 AI 腔"
      actions:
        - "将所有被动句式改为主动叙述"
        - "将模板化排比结构打散，改为有节奏感的散句"
        - "去除过度解释和不必要的逻辑连接词"
        - "将宏观抽象的描述落地到具体细节"

    - name: "增强文学质感"
      actions:
        - "以感官细节（视觉/听觉/触觉/嗅觉）代替概念性描述"
        - "对话语气贴近角色个性，避免千篇一律的说话腔调"
        - "景物描写融入人物情绪，避免独立的环境说明段"
        - "节奏变化：情绪紧张处用短句，舒缓处用长句"

    - name: "保留原意"
      actions:
        - "不添加原文没有的情节、人物或设定"
        - "不改变事件发生的顺序和因果关系"
        - "专有名词、人名、地名保持原样"

  output_requirements:
    - "直接输出润色后的正文，不附任何说明、解释或前言"
    - "不输出'润色完成''以下是润色结果'等元说明"
    - "段落数量与原文保持一致，不增删段落"
    - "保留原文的章节标题格式（如有）"

# ============================================================
# 五、执行说明
# ============================================================
execution_note: |
  请严格按照以下顺序处理用户提供的文本：

  1. 删除：移除 absolute_prohibitions 中所有匹配的词组、段落、格式
  2. 规范：执行 formatting_rules 中的标点、数字规范
  3. 替换：按 replacement_strategy 执行字典替换
     优先级：novel_oral_phrases > phrase_replacements > novel_oral_words > word_replacements
  4. 重写：执行 llm_rewrite_instructions 进行语义润色
  5. 输出：直接给出润色后正文，无需任何附加说明

  等待用户粘贴需要润色的文本后开始执行。
