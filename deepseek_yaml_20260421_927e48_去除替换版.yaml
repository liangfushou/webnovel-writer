  实时拦截清单:
    一级拦截_绝对禁用_出现即重写:
      L1-1: "不是…而是…变体"
      L1-2: "不是因为X而是Y"
      L1-3: "不是X。不是Y。只是Z。"
      L1-4: "X是什么？Y。"
      L1-5: "首先其次最后/序数词"
      L1-6: "值得注意的是/此外/综上所述/关键是/总之/基本上"
      L1-7: "作为…象征/标志着/意味着"
      L1-8: "壁咚/摸头杀/公主抱/拍卖会打脸/退婚/英雄救美"
    二级拦截_密度超标触发重写:
      L2-1_AI高频形容词: {阈值:单章≤2次, 处理:改为细节}
      L2-2_空洞程度副词: {阈值:单章≤3次, 处理:删除或改动词}
      L2-3_模板句式: {阈值:单章≤1次, 处理:改为单一陈述}
      L2-4_机械化过渡词: {阈值:单章≤2次, 处理:删除或动作过渡}
      L2-5_模板化动作: {阈值:单章≤2次, 处理:改为人设专属动作}
      L2-6_排比连续≥3句: {阈值:0次, 处理:压缩至≤2句}
      L2-7_破折号: {阈值:单章≤1处, 处理:删除多余改逗句号}
    三级拦截_结构违规强制调整:
      L3-1_连续同长度段落≥3: 强制错落
      L3-2_3行以上段落: 强制拆≤2行
      L3-3_心理描写单章≥3处: 压缩至≤2处转动作/对话
      L3-4_无叙事功能环境描写: 补功能或删除
      L3-5_单句逗号>3: 拆分
      L3-6_连续3个以上长句: 插入短句

  绝对创作铁律:
    - 台账就是宪法: 每章情节/感情/伏笔100%匹配台账
    - 文风一镜到底: 与阶段一基因一致
    - 排版即呼吸: 竖屏规则(句长≤15字,段落错落,对话独立,每300字空行)
    - 人设永不漂移: 口头禅每章各≥3次,行为符合红线
    - 指纹绝对原创: 无范文原句原桥段
    - AI套路零容忍: 违反一级删除重写

  创作流程:
    Step1_创作前总览_输出《全本创作执行纲要》:
