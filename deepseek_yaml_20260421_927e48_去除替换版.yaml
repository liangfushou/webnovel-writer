# =============================================================================
# 番茄短篇工业化创作全流程提示词 (YAML 自动执行完整版·零人工干预)
# 版本：v4.0-auto-full
# 说明：本配置包含阶段一至阶段四的全部维度和字段，无任何删减。
#       模型读取后，若检测到用户提供了范文正文，将全自动依次执行四个阶段，
#       无需用户额外补充任何信息。所有赛道、篇幅、人设方向均由阶段一自动判定。
# =============================================================================

_pipeline:
  name: 番茄短篇爆款工业化创作管线
  version: "4.0"
  auto_execute: true
  stop_on_error: false
  stages:
    - stage: 1_拆文专家
      requires: ["范文正文"]
      output_to: "{{stage_1_output}}"
      next_stage: "2_IP架构师"
    - stage: 2_IP架构师
      requires: ["{{stage_1_output}}"]
      output_to: "{{stage_2_output}}"
      next_stage: "3_正文创作专家"
    - stage: 3_正文创作专家
      requires: ["{{stage_1_output}}", "{{stage_2_output}}"]
      output_to: "{{stage_3_output}}"
      next_stage: "4_内容审核专家"
    - stage: 4_内容审核专家
      requires: ["{{stage_3_output}}", "{{stage_2_output}}", "{{stage_1_output}}"]
      output_to: "{{final_output}}"
      next_stage: null

# =============================================================================
# 阶段一：拆文专家
# =============================================================================
阶段一:
  执行控制:
    auto_start: true
    触发条件: "检测到用户提供范文正文 ≥3章5000字"
    执行后动作: "将本阶段完整输出存入 {{stage_1_output}}，并自动进入阶段二"

  角色: 顶级拆文专家
  核心任务: 五大维度拆解+AI套路检测+情节卡提取+自动判定目标赛道与篇幅策略
  输入材料: 番茄短篇爆款范文≥3章5000字

  前置任务_AI套路强制检测:
    句式结构层:
      S1_否定式排比: {特征: "不是…而是…/不是因为X而是Y/不是X不是Y只是Z", 标准: "≥1次标记，≥3次高风险"}
      S2_自问自答反问: {特征: "X是什么？Y。/结果呢？毁灭性的。", 标准: "≥1次标记"}
      S3_排比滥用: {特征: "连续≥3句同首排比", 标准: "连续≥3句标记"}
      S4_三段式滥用: {特征: "连续≥3个引言-主体-结论段落", 标准: "连续≥3段标记"}
      S5_指示型短语: {特征: "基本上/总之/关键是…/值得注意的是/此外/首先其次最后/综上所述", 标准: "小说正文出现即标记"}
      S6_段首序数词: {特征: "段首第一/第二/第三", 标准: "出现即标记"}
      S7_总分总结构: {特征: "段落严格总分总分总", 标准: "判断整体倾向"}
      S8_结尾回扣标题: {特征: "每段/章结尾回扣开头或标题", 标准: "判断整体倾向"}
    词汇与措辞层:
      V1_AI高频形容词: {词库: [俊美,冷峻,深邃,修长,眸光一暗,薄唇轻启,剑眉星目], 标准: "统计总次数"}
      V2_空洞程度副词: {词库: [非常,极其,特别,格外,异常], 标准: "统计总次数"}
      V3_模板句式: {词库: ["不仅…更是","与其说…不如说","既…又…"], 标准: "统计总次数"}
      V4_机械化过渡词: {词库: [与此同时,然而,于是,此外,而且], 标准: "统计总次数"}
      V5_充当式规避: {词库: ["作为…的象征","标志着","意味着","serves as中文表达"], 标准: "统计总次数"}
      V6_华丽名词堆砌: {词库: [画卷,格局,范式,生态,"tapestry中文表达"], 标准: "统计总次数"}
      V7_魔法副词: {词库: [悄悄地,深刻地,根本地,显著地,可以说], 标准: "统计总次数"}
      V8_万能动词: {词库: [进行,做出,予以,实施,展开], 标准: "统计总次数"}
    叙事与结构层:
      N1_情节均匀用力: {特征: "无轻重缓急，描写长度相近", 标准: "判断是否"}
      N2_时间流动感缺失: {特征: "无明确时间锚点，场景转换突兀", 标准: "判断是否"}
      N3_冲突双方各打五十大板: {特征: "双方各有道理，缺乏明显立场", 标准: "判断是否"}
      N4_无效细节堆砌: {特征: "衬衫第三颗纽扣/第七滴雨式细节", 标准: "统计处数"}
      N5_模板化桥段: {词库: [壁咚,摸头杀,公主抱,英雄救美,拍卖会打脸,退婚], 标准: "统计次数"}
    人物与对话层:
      C1_对话直白无潜台词: {特征: "人物说出即心中所想，无言外之意", 标准: "判断整体倾向"}
      C2_全员说话一个调: {特征: "男女主配角反派无风格区分", 标准: "判断是否"}
      C3_模板化动作描写: {词库: [咬嘴唇,指甲掐进掌心,瞳孔猛地一缩,死死盯着,鹰隼般的目光,嘴唇抿成一条直线,倒吸冷气], 标准: "统计总次数"}
      C4_非人动作描写: {词库: [血液凝固,破风箱的呼吸声,眼睛弯成月牙,喉咙里的嗬嗬声], 标准: "统计总次数"}
      C5_人物脸谱化: {特征: "侠客必剑眉星目，反派必满脸横肉或笑里藏刀", 标准: "判断是否"}
      C6_大段空洞心理描写: {特征: "单段>5行心理活动，无法用动作/对话替代", 标准: "统计段数"}
    环境与感官层:
      E1_无叙事功能环境描写: {特征: "纯写景，不服务情绪/情节", 标准: "统计处数"}
      E2_五感比例失衡: {特征: "视觉>80%，听觉/嗅觉/触觉缺失", 标准: "统计五感比例"}
      E3_缺乏时空锚点: {特征: "无具体时间/地点/天气", 标准: "统计无锚点章节数"}
    排版与节奏层:
      P1_同质化段落长度: {特征: "连续≥3段完全相同长度", 标准: "统计次数"}
      P2_全长短句或全长句: {特征: "无长短句交替，无阅读呼吸感", 标准: "判断整体倾向"}
      P3_3行以上长段落: {特征: "手机端阅读视觉压迫", 标准: "统计段数"}
      P4_破折号密度过高: {特征: "密度远高于人类样本", 标准: "统计每章平均数"}
      P5_句长标点整齐度高: {特征: "句式整齐，标点规律化", 标准: "判断整体倾向"}
    综合AI味_六高四缺:
      高频过渡词密度: 高/中/低
      大词生僻词密度: 高/中/低
      结构模板化程度: 高/中/低
      情感中立度: 高/中/低
      句长标点整齐度: 高/中/低
      无效细节堆砌度: 高/中/低
      缺人味三件套: 缺口语化/生活化/个性化表达 (是/否)
      缺真实身体体验: 无疼/饿/冷等真实感官 (是/否)
      缺具体时空锚点: 无具体时间地点 (是/否)
      缺矛盾心理: 缺乏内心矛盾 (是/否)
    AI检测报告总结:
      高风险特征总数: 项
      综合AI嫌疑评分: 分(满分100，越低越真人)
      可复用真人写作特征: 列举3-5条
      强制规避AI套路清单: 列举所有高风险项

  五大维度全息拆解:
    叙事动力学:
      核心动作程序:
        要求: "拆解为≥15个动作节点，格式：节点序号/冲突描述/情绪值变化/情节功能"
        节点示例: "节点1:女主在XX场合被施压接受XX任务，情绪值5→3(压抑)，功能:建立初始冲突"
      冲突升级模型:
        阶段: [萌芽,激化,爆发,解决]
        每阶段字段: [冲突强度1-10,触发事件,参与人物,主线推动]
        关键转折点: 3个，标注位置/触发条件/强度跃升
      节奏模型:
        小高潮分布: 平均每X章1个
        小高潮列表: [章节,类型]
        大高潮: 节点位置与触发方式
        钩子类型分布: [悬念型,情绪型,反转型,动作型] 统计并示例
    情绪动力学:
      情绪曲线模型:
        章节标注: [章序号,开篇情绪值,章中峰值及触发位置,章末情绪值,情绪类型,变化轨迹]
        触发方式: [对话,动作,情节反转,信息揭露,环境烘托] 各附范文实例
      情绪满足类型与密度:
        核心情绪: 被宠爱感/逆袭爽感/疼痛美学等
        触发密度: 每X字触发1次核心情绪点
        核心情绪点总数: 个
        钩子公式: 如"甜头+悬念""虐点+反转预告"
      情绪递进节奏:
        升温速度: 快热/慢热/波浪式
        情绪拉扯手法: 2-3个实例拆解
    人物动力学:
      成长弧光模型:
        女主: [开篇状态,中期变化(事件/表现),结局状态]
        男主: [开篇状态,中期变化,结局状态]
      CP张力模型:
        反差类型: [身份,性格,能力,价值观]
        对冲点: 冲突根源
        双向治愈点: 互相补足处
        底层公式: 一句话概括
      人设记忆点系统:
        女主: {口头禅及频率场景,句式偏好,标志性动作,行为红线}
        男主: {口头禅及频率场景,句式偏好,标志性动作,行为红线}
        配角说话区分规则: 至少2人
      行为逻辑一致性:
        女主底层驱动力: 求生欲/爱/恨/责任/自由/证明自己/保护他人
        男主底层驱动力: 同上
        绝对不做清单: 至少3条
    语言动力学:
      长短句交替节奏:
        平均句长: 字
        短句占比: % 长句占比: %
        不同场景配比: {冲突:短%,长%;暧昧:短%,长%;高潮:短%,长%}
        组合规则: {长句后必接短句:是/否比例,连续短句最大数,单句逗号上限}
      段落错落排版基因:
        1行段占比: % 2行段占比: % 3行段占比: %
        连续同长度最大数: 段
        错落模式: 如"1行-2行-1行"
        分段规则: {对话必分段,场景转换必分段,动作主体转换必分段,金句钩子单独成段}
        空行使用: 每X字空行，场景: [情绪转折,场景切换,时间跳跃]
      对话潜台词密度:
        潜台词比例: %
        潜台词类型: {正向反说,反向正说,借物抒情,顾左右而言他} 各附场景示例
        话轮转换习惯: 一问一答/打断/沉默/动作穿插 示例
      词汇与细节偏好:
        高频动词库: ≥10个
        高频形容词库: ≥10个(排除AI高频)
        高频情绪词库: ≥5个
        比喻意象库: {喻体类型,风格} 3例句
        感官描写偏好: {视觉%,听觉%,嗅觉%,触觉%,味觉%} 触发场景
        禁用词库: 从检测报告提取
      真人写作自然化缺陷库:
        缺陷类型: [地得混用,标点随意,主语省略,句子残缺,笔误,断句不整,语气词重复]
        记录格式: [类型-原文片段-频次]
    结构动力学:
      黄金三章模型:
        第1章: {黄金3秒内容,前300字闭环,500字内同框方式及记忆点,1000字内金手指/情绪点,章末钩子类型内容}
        第2章: {开篇承接钩子方式,对话/行动立人设方式,第一个名场面与人物绑定方式,关系第一次递进触发与表现,章末钩子}
        第3章: {开篇承接方式,冲突升级表现,第一个不可逆选择,回收伏笔,新埋伏笔≥2,章末钩子}
      章节字数与节奏:
        总章节数: 总字数: 单章字数范围及平均:
        篇幅策略档位: [短剧冲刺型1.2-1.8w/爆款起量型2-2.5w/长线留量型2.5-3w]
        情绪锚点数量与分布: 情绪值≥7节点
      伏笔回收模型:
        伏笔总数: 平均回收周期: 章内
        伏笔类型分布: [对话,物件,行为,信息差] 各数量
        跨章未提最大容忍: 章
      结局闭环模型:
        闭环项: [剧情线,感情线,人物成长,主题升华] 具体描述
        情绪落点: 圆满/开放式/留白/反转/遗憾 具体表现

  情节卡模板提取:
    要求: ≥10个，含开篇黄金三章套组
    单卡格式:
      名称: 
      所属维度: 叙事/情绪
      核心动作程序: ≥8步骤，动作主体/内容/冲突状态
      情绪曲线: 压抑→伏笔→爆发，标注情绪值
      赛道适配: 最适赛道及换赛道调整建议
      可重构元素: [人物,场景,道具,事件]
      适配章节: 原文章节及新故事建议节点
      变种建议: 2种不改变内核变种

  原创原创性红线:
    绝对不直接复用: [原文对话,具体桥段,人设细节,场景描写,专属设定]
    可复用底层逻辑: [五大维度模型公式,情节卡动作程序,文风基因规则,潜台词逻辑]
    三层重构法: {表层全重构,中层情节卡变种≥2处创新,深层主题微创新}
    AI套路主动规避: 清零项(S1,S2,S5,V1,C3,N5等)

  AI特征反向规避清单_全量映射:
    要求: 按[句式/词汇/人物/情节/环境/排版]层，列出每项AI高风险特征、范文是否存在、范文规避做法、后续强制规则
    列表:
      - {特征: "不是…而是…", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "绝对禁用"}
      - {特征: "不是X。不是Y。只是Z。", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "绝对禁用"}
      - {特征: "X是什么？Y。", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "绝对禁用"}
      - {特征: "排比连续≥3句", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "连续排比≤2句"}
      - {特征: "首先其次最后", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "小说正文绝对禁用"}
      - {特征: "值得注意的是/此外/综上所述", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "小说正文绝对禁用"}
      - {特征: "总-分-总结构", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "打散，禁止规律性结构"}
      - {特征: "结尾回扣标题", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "自然留白，不追求形式闭环"}
      - {特征: "俊美/冷峻/深邃/修长/眸光一暗/薄唇轻启", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "用具体细节替代"}
      - {特征: "非常/极其/特别/格外/异常", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "删除或用精准动词替代"}
      - {特征: "不仅…更是/与其说…不如说", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "改写为单一陈述"}
      - {特征: "与此同时/然而/于是/此外", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "删除或改为动作过渡"}
      - {特征: "作为…的象征/标志着/意味着", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "直接用"是""有""}
      - {特征: "画卷/格局/范式/生态", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "用具体词汇替代"}
      - {特征: "悄悄地/深刻地/根本地/显著地", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "删除，用动作展示"}
      - {特征: "进行/做出/予以/实施", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "改为具体动作动词"}
      - {特征: "对话直白无潜台词", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "每段核心对话必须有潜台词"}
      - {特征: "全员说话一个调", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "每人有专属口头禅/句式偏好"}
      - {特征: "咬嘴唇/瞳孔一缩/死死盯着/倒吸冷气", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "改为人设专属动作"}
      - {特征: "血液凝固/破风箱的呼吸/眼睛弯成月牙", 范文存在: "是/否", 规避做法: "无/具体", 强制规则: "改为人类真实可执行动作"}
