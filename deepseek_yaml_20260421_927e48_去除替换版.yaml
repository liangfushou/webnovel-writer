阶段四:
  执行控制:
    auto_start: true
    触发条件: "阶段三输出完成"
    执行后动作: "将本阶段完整输出存入 {{final_output}}，流程结束"

  角色: 内容审核专家兼签约编辑
  核心任务: 发布前终极全维度终审，输出终稿及运营方案
  输入材料: "{{stage_3_output}} + {{stage_2_output}} + {{stage_1_output}}"

  AI套路终极扫描清单_终审强制逐项:
    一级扫描_绝对禁止:
      扫描项列表: ["不是…而是…变体","不是因为X而是Y","不是X不是Y只是Z","X是什么Y自问自答","首先其次最后序数词","值得注意的是/此外/综上所述/关键是/总之/基本上","作为…象征/标志着/意味着","壁咚/摸头杀/公主抱/拍卖会打脸/退婚/英雄救美"]
      每项字段: [全书出现次数,出现位置章-段,修正方案具体改写]
    二级扫描_密度超标强制优化:
      扫描项列表:
        AI高频形容词: {词库: [俊美,冷峻,深邃,修长,眸光一暗,薄唇轻启], 全书总次数, 总字数, 实际密度, 密度阈值≤0.05%, 是否超标, 修正方案_高频词及改写词库}
        空洞程度副词: {词库: [非常,极其,特别,格外,异常], 全书总次数, 实际密度, 密度阈值≤0.03%, 超标, 修正方案}
        模板句式: {词库: ["不仅…更是","与其说…不如说","既…又…"], 全书总次数, 密度, 阈值≤0.03%, 超标, 修正方案列出句子及改写}
        机械化过渡词: {词库: [与此同时,然而,于是,此外,而且], 全书总次数, 密度, 阈值≤0.02%, 超标, 修正方案列出可删除项}
        模板化动作: {词库: [咬嘴唇,瞳孔一缩,死死盯着,鹰隼般的目光,倒吸冷气,指甲掐进掌心], 全书总次数, 阈值≤2次/章平均, 超标, 修正方案具体位置及改写建议}
        排比连续≥3句: {阈值0处, 违规定位, 压缩方案}
        破折号: {全书总次数, 平均处/章, 阈值≤1/章, 超标, 列出可改逗句号位置}
        万能动词: {词库: [进行,做出,予以,实施,展开], 全书总次数, 密度, 阈值≤0.05%, 超标, 列出具体改写动词}
    三级扫描_结构违规调整:
      扫描项列表:
        - 连续同长度段落≥3段: {违规章数,位置,修正方案插入1行段}
        - 3行以上长段落: {违规章数,位置,修正方案拆分≤2行}
        - 心理描写单章≥3处: {违规章数,位置,修正方案压缩至≤2处转动作对话}
        - 无叙事功能环境描写: {违规章数,位置,修正方案补功能或删除}
        - 无具体时空锚点章节: {违规章数,开篇补充时间/地点/天气≥2项}
        - 对话无潜台词段落: {违规章数,位置,重写增加潜台词}
        - 冲突双方立场中立: {违规章数,位置,明确主角情感立场判断}
        - 无效细节堆砌: {违规章数,位置,删除或赋予功能}
        - 五感视觉>80%: {全书统计,增加听嗅触觉描写位置}
    综合AI嫌疑评分:
