      第1章: {黄金3秒冲突,500字同框方式,1000字金手指/情绪点,章末钩子}
      第2章: {承接钩子方式,第一个专属名场面,关系第一次递进,章末钩子}
      第3章: {承接钩子方式,冲突升级方式,不可逆选择,回收伏笔,新埋伏笔≥2,章末钩子}
      第4章至结局核心任务: 遵循台账闭环
    Step2_逐章沉浸式撰写_1至最终章:
      通用执行标准_每章强制:
        句式排版:
          - 平均句长≤15字
          - 单句逗号≤3
          - 长句后接短句，禁止连续≥3长句
          - 冲突高潮短句≥80%，暧昧渲染长句≤40%
          - 段落≤2行_40字，绝对禁止≥3行
          - 连续同长度段落≤2段，错落如1-2-1
          - 对话100%独立
          - 核心情绪点/金句/钩子100%单独成1行段
          - 每300字左右空行
        AI套路实时规避: 逐句执行禁用词表、词汇改写、动作改写
        冰山理论与文学笔法:
          - 心理描写≤2处且≤3行，优先动作/对话/感官替代
          - 张力通过潜台词对话/环境象征/动作细节传递
          - 每章≥1处有功能的环境描写
          - 每章≥1个特写镜头_物品/动作_2-3句描摹_与情绪相关
          - 每章≥1处非视觉感官_听/嗅/触/味
        人味儿与合规植入:
          - 女主口头禅≥3次，男主口头禅≥3次
          - 真人缺陷植入2-3处_地得混用/口语省略/标点随意/语气词重复等
          - 职业/习惯绑定细节≥1处
          - 每章开篇时空锚点≥2项_时间/地点/天气
          - 冲突中主角明确立场
      第1-3章爆款强化_叠加:
        第1章:
          - 第1句_前20字: 直接切入高密度冲突，无铺垫
          - 前300字: 闭环[冲突→反应→目标→钩子]
          - 500字内: 男女主首次同框，男主留强记忆点
          - 1000字内: 触发首个专属情绪点+亮金手指
          - 章末钩子: 强钩子单独1行段
        第2章:
          - 开篇100字: 无缝承接第1章钩子
          - 人设立住: 对话行动展现，口头禅各≥3次
          - 第一个专属名场面: 与人设绑定
          - 关系第一次递进: 明确变化
          - 章末钩子: 强钩子单独1行段
        第3章:
          - 开篇100字: 无缝承接
          - 冲突升级: 具体化拉满压力
          - 不可逆选择: 女主做出，锁定后续走向
          - 伏笔管理: 回收1次+新埋≥2个
          - 章末钩子: 小反转+大疑问超强钩子
      第4章至结局赛道自适应:
        甜宠: {糖点密度每章≥2浅1深,糖绑专属,男主苏感,情绪甜基调}
        虐恋: {疼痛美学_环境/动作,虐有逻辑,波浪式压抑留光}
        爽文: {打脸节奏升级及时,女主主动,反派不降智,每章≥1爽点}
        都市情感: {冰山理论潜台词留白,人物有缺陷,结局可开放,环境扎根都市}
        通用高级要求: 情绪流连贯,留白余韵,细节象征意义,伏笔回收揭示感
    Step3_章末自检与台账同步更新:
      每章后输出《本章执行报告》含:
        - 台账一致性: 是否100%匹配
        - 人设一致性: 口头禅次数,红线检查,对话区分
        - AI拦截自检: 一/二/三级项统计,缺陷植入数,非视觉感官数
        - 排版校验: 平均句长,占比,错落,对话独立,空行数
        - 伏笔管理: 回收/新埋编号内容
        - 情绪与钩子: 情绪曲线,钩子内容,强度自评
        - 时空锚点: 时间/地点/天气
      填台账: 将数据填入7张台账对应位置

  最终输出:
    1_全本正文整合终稿:
       格式: 仅含"第X章 标题"+正文，章间用"---"分隔，排版严格执行长短句错落规则，无任何报告说明。
    2_全本创作总结:
       五大维度执行确认: 各维度是否完成
       伏笔回收率100%确认: 列表证明
       人设漂移检查: 确认一致，口头禅达标
       AI套路拦截统计总表: 汇总各章数据，综合评分
    3_附_番茄APP最佳阅读设置: 行间距1.6-1.8/字号17-19/背景浅米淡灰

