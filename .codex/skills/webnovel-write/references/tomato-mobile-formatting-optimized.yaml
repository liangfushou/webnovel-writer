# ============================================================
# 使用示例（DeepSeek API 调用）
# ============================================================
usage_example_deepseek: |
  import yaml
  import requests

  # 加载规则
  with open('tomato-mobile-formatting-optimized.yaml', 'r', encoding='utf-8') as f:
      rules = yaml.safe_load(f)

  # 准备文本
  input_text = "你的小说章节内容..."

  # 构建 DeepSeek 提示词
  system_prompt = rules['llm_system_instruction']
  user_prompt = f"""
  请按照番茄小说排版规则处理以下文本：

  {input_text}

  要求：
  1. 对话必须独立成段
  2. 每段不超过80字
  3. 删除AI痕迹词汇
  4. 内心戏转化为动作
  5. 节奏提速，火箭推进
  """

  # 调用 DeepSeek API
  response = requests.post(
      'https://api.deepseek.com/v1/chat/completions',
      headers={'Authorization': 'Bearer YOUR_API_KEY'},
      json={
          'model': 'deepseek-chat',
          'messages': [
              {'role': 'system', 'content': system_prompt},
              {'role': 'user', 'content': user_prompt}
          ],
          'temperature': 0.7,
          'max_tokens': 4000
      }
  )

  result = response.json()['choices'][0]['message']['content']
  print(result)

